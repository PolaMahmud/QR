<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting…</title>
<style>
  html,body{margin:0;height:100%;background:#0e0f0d;color:#e9e9e1;
    font-family:ui-monospace,"IBM Plex Mono",monospace;display:grid;place-items:center}
  .box{text-align:center;padding:24px;max-width:34rem}
  .dot{color:#cdf564;font-size:42px;line-height:1}
  h1{font-weight:500;font-size:20px;margin:18px 0 8px}
  p{color:#8d9081;font-size:14px;margin:6px 0}
  a{color:#cdf564}
  code{color:#cdf564}
</style>
</head>
<body>
<div class="box">
  <div class="dot">⠿</div>
  <h1 id="msg">Looking up link…</h1>
  <p id="sub"></p>
</div>
<script>
/* ============================================================
   Must match index.html
   ============================================================ */
const SITE_BASE = "/QR/";        // path prefix where the site is served
const DATA_FILE = "links.json";

(async function(){
  // pathname looks like "/QR/Ab" or "/QR/Ab/"
  let path = location.pathname;
  let code = "";
  if(path.indexOf(SITE_BASE) === 0){
    code = path.slice(SITE_BASE.length);
  }else{
    // fallback: last non-empty segment
    const parts = path.split("/").filter(Boolean);
    code = parts[parts.length - 1] || "";
  }
  code = decodeURIComponent(code.replace(/\/+$/,"")); // strip trailing slash, decode @ ~ $ & etc.

  if(!code){ return fail("No code in the URL."); }

  try{
    const res = await fetch(SITE_BASE + DATA_FILE + "?t=" + Date.now(), {cache:"no-store"});
    if(!res.ok) throw new Error("links.json not found");
    const db = await res.json();
    const target = db.links && db.links[code];
    if(target){
      document.getElementById("msg").textContent = "Redirecting…";
      document.getElementById("sub").innerHTML = "→ <code>" + escapeHtml(target) + "</code>";
      location.replace(target);
    }else{
      fail("No link found for code “" + escapeHtml(code) + "”.");
    }
  }catch(e){
    fail("Couldn't load the link table.");
  }

  function fail(reason){
    document.getElementById("msg").textContent = "Link not found";
    document.getElementById("sub").innerHTML =
      escapeHtml(reason) + '<br><br><a href="' + SITE_BASE + '">Go to the QR generator →</a>';
  }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
})();
</script>
</body>
</html>
