<!DOCTYPE html>
<html lang="en" data-theme="slate" data-mode="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting…</title>
<script>try{document.documentElement.setAttribute('data-mode',localStorage.getItem('qr_mode')||'auto');}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Serif+Display&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#4A5568; --accent-lt:#EDF0F4; --sec:#2B6CB0; --sec-lt:#EBF4FF;
  --bg:#FAF8F5; --bg-card:#FFFFFF; --txt:#1A1A18; --txt2:#6B6A65; --brd:#E8E5DE;
  --sh-md:0 4px 16px rgba(0,0,0,.06); --rl:16px;
  --accent-dk:#A0AEC0; --accent-lt-dk:#1A1E28; --sec-lt-dk:#152033;
  --mono:'DM Mono',ui-monospace,monospace;
}
[data-mode="dark"]{ --bg:#141413; --bg-card:#1E1E1C; --txt:#EDECEA; --txt2:#A3A29C; --brd:#2E2E2B;
  --sh-md:0 4px 16px rgba(0,0,0,.3); --accent:var(--accent-dk); --accent-lt:var(--accent-lt-dk); --sec-lt:var(--sec-lt-dk); }
@media (prefers-color-scheme:dark){ [data-mode="auto"]{ --bg:#141413; --bg-card:#1E1E1C; --txt:#EDECEA; --txt2:#A3A29C; --brd:#2E2E2B;
  --sh-md:0 4px 16px rgba(0,0,0,.3); --accent:var(--accent-dk); --accent-lt:var(--accent-lt-dk); --sec-lt:var(--sec-lt-dk); } }
html,body{height:100%}
body{ font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--txt); display:grid; place-items:center; min-height:100vh; position:relative; overflow:hidden; }
body::before{ content:''; position:absolute; inset:0; pointer-events:none; opacity:.6;
  background:radial-gradient(ellipse 60% 50% at 25% 35%, var(--accent-lt) 0%, transparent 70%),
             radial-gradient(ellipse 50% 60% at 78% 30%, var(--sec-lt) 0%, transparent 70%); }
.box{ position:relative; text-align:center; padding:2.5rem 2rem; max-width:30rem; margin:1.25rem;
  background:var(--bg-card); border:1px solid var(--brd); border-radius:var(--rl); box-shadow:var(--sh-md); }
.spinner{ width:34px; height:34px; margin:0 auto 1rem; border-radius:50%;
  border:3px solid var(--accent-lt); border-top-color:var(--accent); animation:spin .8s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg) } }
h1{ font-family:'DM Serif Display',Georgia,serif; font-weight:400; font-size:1.5rem; margin:.35rem 0 .5rem; }
p{ color:var(--txt2); font-size:.92rem; margin:.4rem 0; }
code{ font-family:var(--mono); color:var(--accent); word-break:break-all; }
a{ color:var(--sec); font-weight:600; text-decoration:none; }
a:hover{ text-decoration:underline; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spin"></div>
  <h1 id="msg">Looking up link…</h1>
  <p id="sub"></p>
</div>
<script>
/* Must match index.html */
const SITE_BASE = "/QR/";
const DATA_FILE = "links.json";

(async function(){
  let path = location.pathname, code = "";
  if(path.indexOf(SITE_BASE) === 0){ code = path.slice(SITE_BASE.length); }
  else { const parts = path.split("/").filter(Boolean); code = parts[parts.length-1] || ""; }
  code = decodeURIComponent(code.replace(/\/+$/,""));

  if(!code) return fail("No code in the URL.");
  try{
    const res = await fetch(SITE_BASE + DATA_FILE + "?t=" + Date.now(), {cache:"no-store"});
    if(!res.ok) throw new Error("links.json not found");
    const db = await res.json();
    const target = db.links && db.links[code];
    if(target){
      document.getElementById("msg").textContent = "Redirecting…";
      document.getElementById("sub").innerHTML = "→ <code>" + escapeHtml(target) + "</code>";
      location.replace(target);
    }else{ fail("No link found for code “" + escapeHtml(code) + "”."); }
  }catch(e){ fail("Couldn't load the link table."); }

  function fail(reason){
    document.getElementById("spin").style.display = "none";
    document.getElementById("msg").textContent = "Link not found";
    document.getElementById("sub").innerHTML = escapeHtml(reason) + '<br><br><a href="' + SITE_BASE + '">Go to the QR generator →</a>';
  }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
})();
</script>
</body>
</html>
